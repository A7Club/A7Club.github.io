<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A7 柒樂部🎡｜林口、龜山美食生活地圖指南</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;800;900&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Nunito', '"Noto Sans TC"', 'sans-serif'] },
                    colors: {
                        themePink: '#FF9EBB', themeBlue: '#80CFFF', themeYellow: '#FFD166',
                        themeGreen: '#06D6A0', themePurple: '#C197FF'
                    },
                    boxShadow: { 'cute': '0 10px 25px -5px rgba(0, 0, 0, 0.08)' }
                }
            }
        }
    </script>
    <style>
        body { background-color: #FDFBF7; }
        .fade-in { animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="text-gray-700 antialiased min-h-screen flex flex-col">

    <!-- 導航列 -->
    <nav class="sticky top-4 z-40 mx-4 max-w-6xl lg:mx-auto">
        <div class="bg-white/90 backdrop-blur-md rounded-full shadow-cute px-6 py-3 flex justify-between items-center border-2 border-white">
            <div class="flex items-center cursor-pointer gap-2" onclick="loadPage('home')">
                <div class="w-10 h-10 bg-themeYellow rounded-full flex items-center justify-center text-white text-xl"><i class="fa-solid fa-mountain-city"></i></div>
                <span class="font-black text-2xl text-themePink">A7<span class="text-themePurple">柒</span><span class="text-themeBlue">樂部</span></span>
            </div>
            <div class="hidden md:flex space-x-2">
                <button onclick="loadPage('food')" class="px-4 py-2 rounded-full font-bold hover:bg-themePink hover:text-white transition-all">🍿 找美食</button>
                <button onclick="loadPage('shopping')" class="px-4 py-2 rounded-full font-bold hover:bg-themeYellow hover:text-white transition-all">🛍️ 買東西</button>
            </div>
        </div>
    </nav>

    <main id="app-root" class="flex-1 max-w-6xl mx-auto w-full px-4 sm:px-6 py-8 relative"></main>

    <!-- Templates -->
    <template id="tpl-home">
        <div class="fade-in space-y-8">
            <div class="bg-gradient-to-br from-themeBlue/40 to-themePink/40 rounded-[2.5rem] p-12 text-center">
                <h1 class="text-4xl font-black text-white mb-6">探索 A7 在地生活 ✨</h1>
            </div>
            
            <!-- 工具快捷列 -->
            <div class="grid grid-cols-3 md:grid-cols-6 gap-3">
                <button onclick="window.location.href='lifehub.html#mod-school-district'" class="bg-sky-50 p-4 rounded-2xl flex flex-col items-center gap-2 hover:scale-105 transition-all">
                    <div class="w-10 h-10 bg-sky-500 text-white rounded-full flex items-center justify-center"><i class="fa-solid fa-school"></i></div>
                    <span class="text-xs font-black">學區查詢</span>
                </button>
                <button onclick="window.location.href='explore.html#mod-buildings-map'" class="bg-purple-50 p-4 rounded-2xl flex flex-col items-center gap-2 hover:scale-105 transition-all">
                    <div class="w-10 h-10 bg-purple-500 text-white rounded-full flex items-center justify-center"><i class="fa-solid fa-map-location-dot"></i></div>
                    <span class="text-xs font-black">鄰里查詢</span>
                </button>
                <button onclick="toggleShareForm()" class="bg-pink-50 p-4 rounded-2xl flex flex-col items-center gap-2 hover:scale-105 transition-all">
                    <div class="w-10 h-10 bg-pink-500 text-white rounded-full flex items-center justify-center"><i class="fa-solid fa-utensils"></i></div>
                    <span class="text-xs font-black">分享美食</span>
                </button>
                <a href="https://smartstreetlight.tycg.gov.tw:8443/citizen/" target="_blank" class="bg-amber-50 p-4 rounded-2xl flex flex-col items-center gap-2 hover:scale-105 transition-all">
                    <div class="w-10 h-10 bg-amber-500 text-white rounded-full flex items-center justify-center"><i class="fa-solid fa-lightbulb"></i></div>
                    <span class="text-xs font-black">修路燈</span>
                </a>
                <a href="https://generalwaste.tyoem.gov.tw/Prosecution/Create" target="_blank" class="bg-orange-50 p-4 rounded-2xl flex flex-col items-center gap-2 hover:scale-105 transition-all">
                    <div class="w-10 h-10 bg-orange-500 text-white rounded-full flex items-center justify-center"><i class="fa-solid fa-trash-can"></i></div>
                    <span class="text-xs font-black">檢舉</span>
                </a>
                <a href="https://taotalk.tycg.gov.tw/main/PageCtrl?p=p_2&sc_Id=SC034" target="_blank" class="bg-red-50 p-4 rounded-2xl flex flex-col items-center gap-2 hover:scale-105 transition-all">
                    <div class="w-10 h-10 bg-red-500 text-white rounded-full flex items-center justify-center"><i class="fa-solid fa-traffic-light"></i></div>
                    <span class="text-xs font-black">修號誌</span>
                </a>
            </div>

            <div id="food-heart-ranking-container"></div>
        </div>
    </template>

    <template id="tpl-food">
        <div class="fade-in">
            <h2 class="text-2xl font-black text-themePink mb-6">美食販賣部</h2>
            <div id="food-tags-desktop" class="flex flex-wrap gap-2 mb-6"></div>
            <div id="food-list-container" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>
    </template>

    <script>
        const FOOD_CATEGORY_MAP = {
            '全部': 'all',
            '早餐 / 早午餐': 'breakfast',
            '飲料 / 冰品': 'drinks',
            '甜點 / 麵包': 'desserts',
            '咖啡廳': 'coffee',
            '西式餐點': 'western',
            '麵食 / 水餃': 'noodles',
            '飯食 / 便當': 'rice',
            '其他推薦': 'others'
        };

        function getSlugByCategory(cat) { return FOOD_CATEGORY_MAP[cat] || encodeURIComponent(cat); }
        function getCategoryBySlug(slug) {
            const entry = Object.entries(FOOD_CATEGORY_MAP).find(([k, v]) => v === slug);
            return entry ? entry[0] : decodeURIComponent(slug);
        }

        function handleRoute() {
            let hash = window.location.hash.substring(1) || 'home';
            let [page, query] = hash.split('?');
            let params = new URLSearchParams(query);
            
            if (page === 'food') {
                renderPage('food');
                const catSlug = params.get('cat') || 'all';
                renderFoodData(window.globalFoodData, getCategoryBySlug(catSlug));
            } else {
                renderPage(page);
            }
        }

        function changeFoodCategory(cat) {
            const slug = getSlugByCategory(cat);
            history.pushState(null, '', `#food?cat=${slug}`);
            renderFoodData(window.globalFoodData, cat);
        }

        function renderPage(pageId) {
            const root = document.getElementById('app-root');
            const template = document.getElementById('tpl-' + pageId);
            if (template) {
                root.innerHTML = '';
                root.appendChild(template.content.cloneNode(true));
                if (pageId === 'food') fetchFoodData();
                if (pageId === 'home') fetchAndUpdateHomeCounts();
            }
        }

        async function loadSharedFoodData() {
            if (window.globalFoodData) return window.globalFoodData;
            try {
                const res = await fetch('https://docs.google.com/spreadsheets/d/e/2PACX-1vSRpjRieI_ie-YP6zh_a-PBR6thBdyoAuVvMB53A32mJlc0qx1fFd1_2RoeBeQUCGvBQlcACPY1HUVT/pub?gid=1869818804&single=true&output=csv');
                const text = await res.text();
                // (Basic CSV Parsing Logic...)
                window.globalFoodData = []; // Simplified
                return [];
            } catch(e) { return []; }
        }

        async function fetchFoodData() {
            const data = await loadSharedFoodData();
            renderFoodData(data, '全部');
        }

        function renderFoodData(data, activeCategory) {
            const container = document.getElementById('food-list-container');
            const tagsContainer = document.getElementById('food-tags-desktop');
            if(!container) return;

            const categories = ['全部', ...new Set(data.map(i => i.category))];
            tagsContainer.innerHTML = categories.map(cat => `
                <button onclick="changeFoodCategory('${cat}')" class="px-4 py-2 rounded-full font-black ${cat === activeCategory ? 'bg-themePink text-white' : 'bg-white'}">
                    ${cat}
                </button>
            `).join('');
            
            // Render items...
        }

        // Initialize
        window.addEventListener('hashchange', handleRoute);
        document.addEventListener('DOMContentLoaded', handleRoute);
    </script>
</body>
</html>
