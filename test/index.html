        // ==========================================
        // 資料與 API 邏輯 (整合版)
        // ==========================================

        function parseCSV(text) {
            let p = '', row = [''], ret = [row], i = 0, r = 0, s = !0, l;
            for (l of text) {
                if ('"' === l) { if (s && l === p) row[i] += l; s = !s; }
                else if (',' === l && s) l = row[++i] = '';
                else if ('\n' === l && s) { if ('\r' === p) row[i] = row[i].slice(0, -1); row = ret[++r] = [l = '']; i = 0; }
                else row[i] += l;
                p = l;
            }
            return ret.filter(r => r.join('').trim() !== '');
        }

        let globalFoodData = null, globalShoppingData = null, globalCommunityData = null, globalBuildingData = null, globalMedicalData = null, globalLikesData = null;
        const currentUserId = localStorage.getItem('a7club_uid') || (localStorage.setItem('a7club_uid', 'user_' + Date.now()), localStorage.getItem('a7club_uid'));

        async function loadSharedData(url, processRowFn, cachedData) {
            if (cachedData) return cachedData;
            try {
                const res = await fetch(url);
                const rows = parseCSV(await res.text());
                if (rows.length < 2) return [];
                return rows.slice(1).map(processRowFn).filter(Boolean);
            } catch(e) { return []; }
        }

        async function loadSharedFoodData() {
            globalFoodData = await loadSharedData(
                'https://docs.google.com/spreadsheets/d/e/2PACX-1vTmr3ebvX4CeJ_Dc-TK_57zxqaVlXfI4CPVcgTAWAIKM29dtR-SqiFs93i2iz1ScwYEBcty8mlIxKYO/pub?gid=1150395419&single=true&output=csv',
                (row, i, arr, headers = arr[0]) => {
                    if (!row[1] || row[1].trim() === '') return null; // 簡化檢查：依賴 name
                    return {
                        name: row[1] || '未命名', category: row[2] || '未分類', address: row[3] ? row[3].trim() : '',
                        img: row[11] && row[11].startsWith('http') ? row[11] : '',
                        lat: row[14] ? parseFloat(row[14]) : null, lng: row[15] ? parseFloat(row[15]) : null,
                        status: row[10] || 'OK', likesCount: parseInt(row[16]) || 0,
                        timestamp: new Date(row[0]).getTime() || 0
                    };
                }, globalFoodData
            );
            return globalFoodData;
        }

            if (globalLikesData) return globalLikesData;
            globalLikesData = JSON.parse(localStorage.getItem('a7club_likes_cache') || '{}');
            return globalLikesData;
        }

        function toggleLike(event, storeName) {
            event.stopPropagation();
            if (!globalLikesData[storeName]) globalLikesData[storeName] = { users: [] };
            const users = globalLikesData[storeName].users;
            const idx = users.indexOf(currentUserId);
            const isLiked = idx !== -1;
            
            if (isLiked) users.splice(idx, 1);
            else users.push(currentUserId);

            localStorage.setItem('a7club_likes_cache', JSON.stringify(globalLikesData));
            
            // 視覺更新
            const btn = event.currentTarget;
            const icon = btn.querySelector('i');
            const countSpan = btn.querySelector('span');
            countSpan.innerText = Math.max(0, parseInt(countSpan.innerText) + (isLiked ? -1 : 1));
            
            if (!isLiked) {
                icon.className = 'fa-solid fa-heart text-[#FF4785] heart-beat-active';

        async function fetchAndUpdateHomeCounts() {
            const [foodData, likesData] = await Promise.all([loadSharedFoodData(), loadSharedLikesData()]);
            const counts = { 'counter-food': foodData.length, 'counter-total': foodData.length, 'counter-likes': Object.values(likesData).reduce((sum, item) => sum + item.users.length, 0) };
            for (const [id, target] of Object.entries(counts)) {
                const el = document.getElementById(id);
                if (el) animateSingleCounter(el, target);
            }
            renderFoodRankings(foodData, likesData);
        }

        function renderFoodRankings(foodData, likesData) {
            const container = document.getElementById('food-heart-ranking-container');
            if (!container) return;

            const ranked = foodData.map(item => ({ ...item, total: Math.max(item.likesCount || 0, likesData[item.name]?.users.length || 0) }))
                                   .filter(i => i.total > 0).sort((a, b) => b.total - a.total).slice(0, 10);

            if (!ranked.length) { container.innerHTML = ''; return; }

            const podium = [
                { data: ranked[1], h: 'h-[75%]', col: 'bg-gray-100', icon: '🥈' },
                { data: ranked[0], h: 'h-full', col: 'bg-gradient-to-t from-yellow-100 to-yellow-50', icon: '🥇' },
                { data: ranked[2], h: 'h-[60%]', col: 'bg-orange-50', icon: '🥉' }

            const getOnClick = (item) => `onclick="loadPage('food'); setTimeout(()=>updateFoodMap('${item.address}', '${item.name}', ${item.lat}, ${item.lng}, '${item.category}'), 500);"`;

            const runnerUps = ranked.slice(3);
            const runnerUpHtml = runnerUps.length ? `
                <div class="w-full lg:w-[40%] flex flex-col pt-6 lg:pt-0 lg:pl-6 lg:border-l-2 lg:border-pink-100 border-t-2 lg:border-t-0 border-pink-100 mt-8 lg:mt-0">

                    <div class="flex flex-col gap-2">
                        ${runnerUps.map((item, i) => `

                                <div class="flex items-center gap-3"><span class="w-5 font-black text-gray-400 italic">${i + 4}</span><h4 class="font-bold text-xs truncate">${item.name}</h4></div>
                                <div class="bg-pink-50 px-2 py-0.5 rounded-full"><i class="fa-solid fa-heart text-[#FF4785] text-[10px]"></i> <span class="text-[10px] font-black">${item.total}</span></div>
                            </div>
                        `).join('')}
                    </div>
                </div>` : '';

            container.innerHTML = `
                <div class="bg-gradient-to-b from-white to-pink-50/30 rounded-[2.5rem] p-6 shadow-cute border-4 border-pink-100 relative w-full">
                    <div class="flex flex-col lg:flex-row w-full relative z-10">

                                    <div ${getOnClick(p.data)} class="w-1/3 max-w-[120px] ${p.h} ${p.col} border-t-4 border-gray-200 rounded-t-2xl flex flex-col items-center p-2 cursor-pointer hover:-translate-y-2 transition-transform">
                                        <div class="text-3xl mb-2">${p.icon}</div><h4 class="font-bold text-xs truncate w-full text-center">${p.data.name}</h4>
                                        <span class="bg-white/80 px-2 py-0.5 rounded-full text-xs font-black text-pink-500 mt-2">${p.data.total}</span>
                                    </div>
                                `).join('')}

        function animateSingleCounter(counter, target) {
            let frame = 0, totalFrames = 60;
            const update = () => {
                frame++;
                counter.innerText = Math.round(target * (frame / totalFrames));
                if (frame < totalFrames) requestAnimationFrame(update); else counter.innerText = target;
            };
            requestAnimationFrame(update);
        }

        // ==========================================
        // 美食地圖與列表邏輯
        // ==========================================

        const CATEGORY_STYLES = [
            { keywords: ['早', '早餐'], iconClass: 'fa-egg', bgColor: 'bg-yellow-400', textColor: 'text-yellow-600', emoji: '🍳' },
            { keywords: ['飲', '茶'], iconClass: 'fa-glass-water', bgColor: 'bg-teal-400', textColor: 'text-teal-600', emoji: '🧋' },

        function getCategoryStyle(cat) {

        function initFoodMap() {
            if (foodMapInstance) { foodMapInstance.remove(); }
            foodMapInstance = L.map('food-leaflet-map', { zoomControl: false }).setView([25.0425, 121.3870], 15);
            L.control.zoom({ position: 'bottomright' }).addTo(foodMapInstance);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(foodMapInstance);
            foodClusterGroup = L.markerClusterGroup({ maxClusterRadius: 40 });
            foodMapInstance.addLayer(foodClusterGroup);
        }

        window.changeFoodCategory = function(cat) {
            history.pushState(null, '', `#food?cat=${getCategorySlug(cat)}`);

        function renderFoodData(data, activeCategory) {
            const container = document.getElementById('food-list-container');
            if (!container) return;

            const categories = ['全部', ...new Set(data.map(i => i.category).filter(Boolean))];
            const tagsHtml = categories.map(cat => `
                <button onclick="changeFoodCategory('${cat}')" class="px-4 py-2 rounded-full font-black text-xs md:text-sm border border-pink-100 ${cat === activeCategory ? 'bg-themePink text-white' : 'bg-white text-gray-600'}">
                    ${cat === '全部' ? '🎡' : getCategoryStyle(cat).emoji} ${cat}
                </button>
            `).join('');

            document.getElementById('food-tags-desktop').innerHTML = tagsHtml;
            document.getElementById('food-tags-mobile').innerHTML = tagsHtml;

            const filteredData = activeCategory === '全部' ? data : data.filter(i => i.category === activeCategory);
            
            if (foodClusterGroup) foodClusterGroup.clearLayers();
            foodMarkersMap = {};

            filteredData.forEach(item => {
                if (item.lat && item.lng) {
                    const style = getCategoryStyle(item.category);
                    const icon = L.divIcon({
                        className: 'bg-transparent border-0',
                        html: `<div class="w-8 h-8 ${style.bgColor} text-white rounded-full flex items-center justify-center shadow-md border-2 border-white"><i class="fa-solid ${style.iconClass}"></i></div>`,
                        iconSize: [32, 32], iconAnchor: [16, 16]
                    });
                    const marker = L.marker([item.lat, item.lng], { icon }).bindTooltip(item.name);
                    marker.on('click', () => updateFoodMap(item.address, item.name, item.lat, item.lng, item.category));
                    foodClusterGroup.addLayer(marker);
                    foodMarkersMap[item.name] = marker;
                }
            });

            if (foodClusterGroup.getLayers().length > 0) foodMapInstance.fitBounds(foodClusterGroup.getBounds());

            container.innerHTML = filteredData.map(item => {
                const style = getCategoryStyle(item.category);
                const isLiked = (globalLikesData[item.name]?.users || []).includes(currentUserId);
                const likes = Math.max(item.likesCount || 0, globalLikesData[item.name]?.users.length || 0);
                
                return `
                    <div onclick="updateFoodMap('${item.address}', '${item.name}', ${item.lat}, ${item.lng}, '${item.category}')" class="bg-white p-4 rounded-3xl shadow-cute flex items-center gap-4 cursor-pointer relative">
                        <div class="w-16 h-16 ${style.bgColor}/20 rounded-xl flex items-center justify-center text-3xl ${style.textColor}">${item.img ? `<img src="${item.img}" class="w-full h-full object-cover rounded-xl">` : `<i class="fa-solid ${style.iconClass}"></i>`}</div>
                        <div class="flex-1"><h4 class="font-black text-gray-800">${item.name}</h4><p class="text-xs text-gray-500 truncate mt-1">${item.address}</p></div>
                        <button onclick="toggleLike(event, '${item.name}')" class="absolute bottom-3 right-3 text-xs font-black px-2 py-1 rounded-full border ${isLiked ? 'bg-pink-50 border-pink-300 text-pink-500' : 'border-gray-200 text-gray-400'}"><i class="${isLiked ? 'fa-solid' : 'fa-regular'} fa-heart"></i> ${likes}</button>
                    </div>`;
            }).join('');
        }

        window.updateFoodMap = function(address, name, lat, lng, cat) {
            if (lat && lng && foodMapInstance) {
                foodMapInstance.flyTo([lat, lng], 18);
                if (foodMarkersMap[name]) foodMarkersMap[name].openTooltip();
            }
        };
