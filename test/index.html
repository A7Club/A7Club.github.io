    <style>
        body {
            background-color: #FDFBF7;
            /* 融入機捷紫與可愛粉的雙色波卡圓點，加大間距與點點大小，溫和不密集 */
            background-image:
                radial-gradient(rgba(193, 151, 255, 0.35) 4px, transparent 4px),
                radial-gradient(rgba(255, 158, 187, 0.25) 4px, transparent 4px);
            background-size: 120px 120px;
            background-position: 0 0, 60px 60px;
        }

        /* 自訂可愛滾動條 (加入 height 以支援橫向滾動條) */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #FF9EBB;
            border-radius: 10px;
            border: 2px solid #FDFBF7;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #ff7eb3;
        }

        /* 在地新商家專屬橘色捲動條 */
        .scrollbar-orange::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        .scrollbar-orange::-webkit-scrollbar-track {
            background: transparent;
        }

        .scrollbar-orange::-webkit-scrollbar-thumb {
            background: #FECF7A;
            border-radius: 10px;
            border: 2px solid #FDFBF7;
        }

        .scrollbar-orange::-webkit-scrollbar-thumb:hover {
            background: #FFD166;
        }

        /* 隱藏橫向滾動條(強制一列時使用) */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* 頁面切換動畫 */
        .fade-in {
            animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px) scale(0.98);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* 標籤氣球動畫 */
        .floating {
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-8px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        /* 數字跳動的字體強調 */
        .num-counter {
            font-family: 'Nunito', sans-serif;
            font-variant-numeric: tabular-nums;
        }

        /* --- Leaflet 客製化樣式 --- */
        .leaflet-popup-content-wrapper {
            border-radius: 1.5rem !important;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1) !important;
            padding: 4px !important;
        }

        .leaflet-popup-content {
            margin: 10px !important;
            font-family: 'Nunito', '"Noto Sans TC"', sans-serif;
        }

        /* 為 Leaflet Popup 關閉按鈕加上粉紅底圖與白色X (上移並靠右) */
        .leaflet-popup-close-button {
            top: 4px !important;
            right: 4px !important;
            color: white !important;
            background-color: #FF9EBB !important;
            border-radius: 50% !important;
            width: 24px !important;
            height: 24px !important;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2) !important;
            text-align: center !important;
            line-height: 24px !important;
            font-size: 16px !important;
            font-weight: 900 !important;
            padding: 0 !important;
            z-index: 100 !important;
        }

        .leaflet-popup-close-button:hover {
            background-color: #ff7eb3 !important;
            color: white !important;
            transform: scale(1.1);
            transition: transform 0.2s ease;
        }

        .marker-cluster-small,
        .marker-cluster-medium,
        .marker-cluster-large {
            background-color: rgba(255, 158, 187, 0.5) !important;
        }

        .marker-cluster-small div,
        .marker-cluster-medium div,
        .marker-cluster-large div {
            background-color: rgba(255, 158, 187, 0.9) !important;
            color: white !important;
            font-family: 'Nunito', sans-serif !important;
            font-weight: 900 !important;
        }

        .custom-leaflet-icon-dynamic .fa-solid {
            margin-bottom: 2px;
            margin-right: 1px;
        }

        .leaflet-tooltip.custom-tooltip {
            background-color: white;
            color: #FF9EBB;
            font-weight: 900;
            border-radius: 0.5rem;
            border: none;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            padding: 4px 10px;
            font-family: 'Nunito', '"Noto Sans TC"', sans-serif;
        }

        .leaflet-tooltip.custom-tooltip::before {
            border-top-color: white;
        }

        /* 水滴圖標動畫 */
        .floating-marker {
            animation: floatMarker 2.5s ease-in-out infinite;
        }

        @keyframes floatMarker {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-4px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        /* 恢復圖標彈跳動畫 */
        .bounce-marker {
            animation: bounceMarker 0.5s cubic-bezier(0.28, 0.84, 0.42, 1) infinite;
        }

        @keyframes bounceMarker {
            0% {
                transform: translateY(0px) scale(1, 1);
            }

            45% {
                transform: translateY(-12px) scale(0.95, 1.05);
            }

            100% {
                transform: translateY(0px) scale(1, 1);
            }
        }

        /* 恢復愛心動畫 */
        @keyframes heartBeat {
            0% {
                transform: scale(1);
            }

            14% {
                transform: scale(1.35);
            }

            28% {
                transform: scale(1);
            }

            42% {
                transform: scale(1.35);
            }

            70% {
                transform: scale(1);
            }

            100% {
                transform: scale(1);
            }
        }

        .heart-beat-active {
            animation: heartBeat 0.8s ease-in-out infinite;
        }

        /* --- 💎 奢華手搖飲大賞專屬特效 --- */

        .selection-ticket {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 2px solid #FFF;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            border-radius: 1.25rem;
        }

        .selection-ticket:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px -10px rgba(255, 158, 187, 0.4);
            border-color: #FF9EBB;
        }

        .selection-ticket.selected {
            background: linear-gradient(135deg, #FFF5F7 0%, #FFE4E9 100%);
            border-color: #FF9EBB;
            box-shadow: 0 10px 20px -5px rgba(255, 158, 187, 0.3);
        }

        .rising-heart {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            color: #FF4785;
            animation: riseAndFade 0.8s ease-out forwards;
        }

        @keyframes riseAndFade {
            0% {
                transform: translate(-50%, -50%) scale(0.5) rotate(0deg);
                opacity: 1;
            }

            100% {
                transform: translate(-50%, -150%) scale(1.5) rotate(20deg);
                opacity: 0;
            }
        }

        .gold-pulse {
            position: relative;
            z-index: 1;
        }

        .gold-pulse::after {
            content: '';
            position: absolute;
            top: -4px;
            right: -4px;
            bottom: -4px;
            left: -4px;
            background: linear-gradient(45deg, #FF9EBB, #FFD166, #FF9EBB);
            background-size: 200% 200%;
            z-index: -1;
            border-radius: 1.25rem;
            filter: blur(8px);
            opacity: 0;
            transition: opacity 0.3s;
            animation: shimmer 2s linear infinite;
        }

        .gold-pulse:not(:disabled)::after {
            opacity: 0.6;
        }

        @keyframes shimmer {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }




        @keyframes flyUpFade {
            0% {
                transform: translateY(0) scale(1) rotate(0deg);
                opacity: 1;
            }

            100% {
                transform: translateY(-60px) scale(1.5) rotate(15deg);
                opacity: 0;
            }
        }

        .flying-heart {
            position: fixed;
            pointer-events: none;
            animation: flyUpFade 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
            color: #FF4785;
            font-size: 1.5rem;
            z-index: 9999;
            text-shadow: 0 4px 8px rgba(255, 71, 133, 0.3);
        }

        /* 🎰 拉霸機特製動畫 */
        @keyframes bounce-x {

            0%,
            100% {
                transform: translateX(0);
            }

            50% {
                transform: translateX(-4px);
            }
        }

        .animate-bounce-x {
            animation: bounce-x 1s infinite ease-in-out;
        }

        @keyframes scan-line {
            0% {
                top: 0%;
                opacity: 0;
            }

            50% {
                opacity: 0.8;
            }

            100% {
                top: 100%;
                opacity: 0;
            }
        }

        .animate-scan {
            position: absolute;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #FF9EBB, transparent);
            animation: scan-line 2s linear infinite;
        }

        @keyframes shimmer {
            0% {
                transform: translateX(-100%);
            }

            100% {
                transform: translateX(100%);
            }
        }
    </style>
</head>

            '全部': 'all'
        };

        window.getCategorySlug = function(cat) {
            if (!cat || cat === '全部') return 'all';
            if (FOOD_CAT_SLUG_MAP[cat]) return FOOD_CAT_SLUG_MAP[cat];
            for (const [key, slug] of Object.entries(FOOD_CAT_SLUG_MAP)) {
                if (cat.includes(key)) return slug;
            }
            return 'c-' + btoa(encodeURIComponent(cat)).substring(0, 6).toLowerCase();
        };

        window.changeFoodCategory = function(cat) {
            const slug = window.getCategorySlug(cat);
            history.pushState(null, '', `#food?cat=${slug}`);
            renderFoodData(globalFoodData, cat);
        };

        // 初始化與路由監聽 
        document.addEventListener('DOMContentLoaded', () => {
            handleRoute();
        });

        window.addEventListener('hashchange', handleRoute);

        // 核心路由控制處理器
        function handleRoute(customRoute) {
            let hash = 'home';
            if (typeof customRoute === 'string') {
                hash = customRoute;
            } else {
                try {
                    hash = window.location.hash.substring(1) || 'home';
                } catch (e) {
                    hash = 'home';
                }
            }

            let routePath = hash;
            if (hash.includes('?')) {
                routePath = hash.split('?')[0];
            }

            // 處理搜尋的特殊路由
            if (routePath.startsWith('search=')) {
                const query = decodeURIComponent(routePath.substring(7));
                renderPage('search');
                executeSearchLogic(query);
            } else if (routePath === 'buildings' || routePath === 'explore') {
                // 原本 explore 頁面的錨點或路由，直接導向新的獨立頁面
                window.location.href = 'explore.html' + (routePath === 'buildings' ? '#buildings' : '');
            } else if (routePath === 'school') {
                // 特殊錨點路由：切換到外部生活通頁面並定位
                window.location.href = 'lifehub.html#school';
            } else {
                renderPage(routePath);
            }
        }

        // 修改原本的 loadPage，改為推播網址 Hash
        function loadPage(pageId) {
            try {
                history.pushState(null, '', '#' + pageId);
            } catch (e) {
            }
            handleRoute(pageId);
        }

        // 打開店家詳細資訊 Modal
        function openStoreModal(name, tag, tagColor, desc, address, hours, imgUrl, mapQuery) {
            document.getElementById('store-modal-title').innerText = name;

            const tagEl = document.getElementById('store-modal-tag');
            tagEl.innerText = tag;
            tagEl.className = `text-xs font-black px-2.5 py-1 rounded-lg text-white shadow-sm ${tagColor}`;

            document.getElementById('store-modal-desc').innerText = desc;
            document.getElementById('store-modal-hours').innerText = hours;

            const imgContainer = document.getElementById('store-modal-img-container');
            imgContainer.innerHTML = `
                <img src="${imgUrl}" class="absolute inset-0 w-full h-full object-cover">
                <div class="absolute inset-0 bg-gradient-to-t from-black/50 to-transparent z-10"></div>
            `;

            const mapBtn = document.getElementById('store-modal-map-btn');
            const qrContainer = document.getElementById('store-modal-qr-container');
            const qrImg = document.getElementById('store-modal-qr-img');
            const lineBtn = document.getElementById('store-modal-line-btn');
            const ratingContainer = document.getElementById('store-modal-rating-container');
            const addressEl = document.getElementById('store-modal-address');

            if (mapQuery && mapQuery.startsWith('http') && (mapQuery.includes('line.me') || mapQuery.includes('lin.ee'))) {
                mapBtn.classList.add('hidden');
                qrContainer.classList.remove('hidden');
                qrContainer.classList.add('flex');

                qrImg.src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(mapQuery)}`;
                lineBtn.href = mapQuery;

                if (ratingContainer) ratingContainer.classList.add('hidden');
                addressEl.innerHTML = `<span class="text-[#00B900]">官方 LINE 帳號諮詢</span>`;

            } else {
                qrContainer.classList.add('hidden');
                qrContainer.classList.remove('flex');
                mapBtn.classList.remove('hidden');

                if (ratingContainer) ratingContainer.classList.remove('hidden');
                addressEl.innerText = address;

                let validQuery = mapQuery || name;
                mapBtn.href = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(validQuery)}`;
                mapBtn.innerHTML = `<i class="fa-solid fa-map-location-dot text-xl"></i> 前往 Google Map 查看詳細資訊`;
                mapBtn.className = "w-full text-white bg-blue-500 hover:bg-blue-600 font-black py-3.5 rounded-xl shadow-md flex items-center justify-center gap-2 transition-transform hover:scale-[1.02] text-lg";
            }

            const modal = document.getElementById('store-modal');
            const content = document.getElementById('store-modal-content');

            modal.classList.remove('hidden');
            modal.classList.add('flex');

            setTimeout(() => {
                content.classList.remove('scale-95', 'opacity-0');
                content.classList.add('scale-100', 'opacity-100');
            }, 10);
        }

                            if (exploreSnippet) return;
                            if (node.nodeType === Node.TEXT_NODE) {
                                const text = node.textContent.trim();
                                if (text.toLowerCase().includes(q) && text.length > 1) {
                                    const matchIdx = text.toLowerCase().indexOf(q);
                                    const startIndex = Math.max(0, matchIdx - 25);
                                    const endIndex = Math.min(text.length, matchIdx + q.length + 25);
                                    let snippet = text.substring(startIndex, endIndex);
                                    if (startIndex > 0) snippet = '...' + snippet;
                                    if (endIndex < text.length) snippet = snippet + '...';
                                    const regex = new RegExp(`(${safeQ})`, 'gi');

                                        if (parent.hasAttribute('data-shows-on')) {

                                            if (showsOnTabs.length === 1 && showsOnTabs[0] !== 'overview') {
                                                targetTab = showsOnTabs[0];

        // --- 共享資料載入函式 (新增) ---
        async function loadSharedMedicalData() {
            const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTmr3ebvX4CeJ_Dc-TK_57zxqaVlXfI4CPVcgTAWAIKM29dtR-SqiFs93i2iz1ScwYEBcty8mlIxKYO/pub?gid=368795626&single=true&output=csv';
            try {
                const res = await fetch(csvUrl);
                const csvText = await res.text();
                const rows = parseCSV(csvText);
                if (!rows || rows.length === 0) return [];
                const headers = rows[0];
                let nameIdx = headers.findIndex(k => k.includes('名稱') || k.includes('機構'));
                if (nameIdx === -1) nameIdx = 0;
                let catIdx = headers.findIndex(k => k.includes('醫療分類'));
                if (catIdx === -1) catIdx = headers.length > 8 ? 8 : headers.length - 1;
                const addressIdx = headers.findIndex(k => k.includes('地址'));
                return rows.slice(1).map(row => ({
                    name: row[nameIdx]?.trim() || '',
                    category: row[catIdx]?.trim() || '其他醫療',
                    address: addressIdx !== -1 ? row[addressIdx]?.trim() : ''
                })).filter(item => item.name);
            } catch (e) { return []; }
        }

        // --- 清理便利商店品牌前綴 ---
        function getCleanStoreName(name, category) {
            if (!name) return name;
            if (name.includes('蝦皮')) {
                return name.replace(/^(蝦皮店到店|蝦皮)\s*[-－]?\s*/i, '').trim();
            }
            if (category && category.includes('便利')) {
                return name.replace(/^(7-ELEVEN|7-11|全家便利商店|全家|萊爾富便利商店|萊爾富|OK便利商店|OK MART)\s*[-－]?\s*/i, '').trim();
            }
            return name;
        }

        // --- 機捷動態更新與渲染 ---
        window.updateMRTStatus = function () {
            const nbEls = document.querySelectorAll('.mrt-time-north');
            const sbEls = document.querySelectorAll('.mrt-time-south');
            if (nbEls.length === 0 || !window.mrtBaseData) return;

            const now = new Date();
            const elapsedMin = (now.getTime() - window.mrtBaseData.timestamp) / 60000;

            let nDiff = window.mrtBaseData.n !== null ? window.mrtBaseData.n - elapsedMin : null;
            let sDiff = window.mrtBaseData.s !== null ? window.mrtBaseData.s - elapsedMin : null;

            if (nDiff !== null) { while (nDiff < -1) nDiff += 15; }
            if (sDiff !== null) { while (sDiff < -1) sDiff += 15; }

            const updateText = (els, diff, unitClass, isNorth) => {
                els.forEach(el => {
                    const unitEl = el.parentElement.querySelector('.' + unitClass);
                    if (diff === null || isNaN(diff)) {
                        el.innerText = '--';
                        el.className = isNorth
                            ? 'mrt-time-north text-2xl sm:text-4xl font-black text-purple-600 font-mono w-8 sm:w-10 text-center'
                            : 'mrt-time-south text-2xl sm:text-4xl font-black text-white font-mono w-8 sm:w-10 text-center';
                        if (unitEl) unitEl.style.display = 'inline';
                    } else if (diff <= 0 && diff >= -1) {
                        el.innerText = '進站中';
                        el.className = isNorth
                            ? 'mrt-time-north text-xl sm:text-3xl font-black text-red-500 animate-pulse mt-1.5 drop-shadow-sm w-full text-center tracking-widest'
                            : 'mrt-time-south text-xl sm:text-3xl font-black text-red-300 animate-pulse mt-1.5 drop-shadow-sm w-full text-center tracking-widest';
                        if (unitEl) unitEl.style.display = 'none';
                    } else {
                        el.innerText = Math.max(0, Math.ceil(diff));
                        el.className = isNorth
                            ? 'mrt-time-north text-2xl sm:text-4xl font-black text-purple-600 font-mono w-8 sm:w-10 text-center'
                            : 'mrt-time-south text-2xl sm:text-4xl font-black text-white font-mono w-8 sm:w-10 text-center';
                        if (unitEl) unitEl.style.display = 'inline';
                    }
                });
            };

            updateText(nbEls, nDiff, 'mrt-unit-north', true);
            updateText(sbEls, sDiff, 'mrt-unit-south', false);

            const renderTrack = (containerId) => {
                const trackEl = document.getElementById(containerId);
                if (trackEl) {
                    let html = '';
                    if (nDiff !== null && nDiff <= 15) {
                        let pos = 50 + (nDiff * (50 / 10));
                        pos = Math.max(0, Math.min(100, pos));
                        html += `<div class="absolute top-[0px] -translate-x-1/2 z-20 transition-all duration-1000" style="left:${pos}%"><div class="bg-white text-purple-600 rounded-full shadow-md border-2 border-purple-200 flex items-center justify-center relative px-2 py-1 gap-1 animate-pulse"><i class="fa-solid fa-caret-left text-[10px]"></i><i class="fa-solid fa-train-subway text-xs sm:text-sm"></i></div></div>`;
                    }
                    if (sDiff !== null && sDiff <= 15) {
                        let pos = 50 - (sDiff * (50 / 10));
                        pos = Math.max(0, Math.min(100, pos));
                        html += `<div class="absolute top-[16px] sm:top-[26px] -translate-x-1/2 z-20 transition-all duration-1000" style="left:${pos}%"><div class="bg-purple-500 sm:bg-purple-700 text-white rounded-full shadow-md border-2 border-white flex items-center justify-center relative px-2 py-1 gap-1 animate-pulse" style="animation-delay: 0.5s;"><i class="fa-solid fa-train-subway text-xs sm:text-sm"></i><i class="fa-solid fa-caret-right text-[10px]"></i></div></div>`;
                    }
                    trackEl.innerHTML = html;
                }
            };

            renderTrack('mrt-track-container-transit');
            renderTrack('mrt-track-container-overview');
        };

        // --- 交通轉乘：改用 GAS 雲端 API ---
        async function fetchRealtimeTransitData() {
            const refreshIcon = document.getElementById('transit-refresh-icon');
            if (refreshIcon) refreshIcon.classList.add('fa-spin');

            const GAS_URL = "https://script.google.com/macros/s/AKfycbw0t0lUbxn6MV30sK75uGCNz6y_paQzQHtTvyFBpVd-uuPIAJ3op--wkv9TI6EjuGUxWw/exec";

            const generateStaticMrtTimes = (schedule) => {
                const now = new Date();
                const totalCurrentSecs = now.getMinutes() * 60 + now.getSeconds();
                let nextTotalSecs = schedule.map(m => m * 60).find(s => s >= totalCurrentSecs);
                if (nextTotalSecs === undefined) nextTotalSecs = (60 + schedule[0]) * 60;
                const result = (nextTotalSecs - totalCurrentSecs) / 60;
                return Math.max(0, result - 1);
            };

            try {
                const response = await fetch(GAS_URL, { redirect: "follow" });

        function animateSingleCounter(counter, target) {
            const duration = 2000;
            const frameRate = 1000 / 60;
            const totalFrames = Math.round(duration / frameRate);
            let currentFrame = 0;

            const easeOutExpo = t => t === 1 ? 1 : 1 - Math.pow(2, -10 * t);

            const updateCounter = () => {
                currentFrame++;
                const progress = easeOutExpo(currentFrame / totalFrames);
                const currentVal = Math.round(target * progress);
                counter.innerText = currentVal;

                if (currentFrame < totalFrames) {
                    requestAnimationFrame(updateCounter);
                } else {
                    counter.innerText = target;
                }
            };

            counter.innerText = '0';
            requestAnimationFrame(updateCounter);
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                Math.sin(dLon / 2) * Math.sin(dLon / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c;
        }

        // CSV 解析器
        function parseCSV(text) {
            let p = '', row = [''], ret = [row], i = 0, r = 0, s = !0, l;
            for (l of text) {
                if ('"' === l) {
                    if (s && l === p) row[i] += l;
                    s = !s;
                } else if (',' === l && s) l = row[++i] = '';
                else if ('\n' === l && s) {
                    if ('\r' === p) row[i] = row[i].slice(0, -1);
                    row = ret[++r] = [l = '']; i = 0;
                } else row[i] += l;
                p = l;
            }
            return ret.filter(r => r.join('').trim() !== '');
        }

        function formatAddress(address) {
            if (!address) return '';
            return address.replace(/^\d{3,6}\s*/, '');

            if (upperName.includes('萊爾富')) return 'https://www.greenpoint.org.tw/GPHome/images/Greenpoint/logo-200x200/Hi-Life_LOGO_200x200_02.jpg';

        // 提取店家的所屬連鎖品牌（用於次分類標籤）
        function getStoreBrand(name) {
            if (!name) return '其他';
            const upperName = name.toUpperCase();
            if (upperName.includes('7-ELEVEN') || upperName.includes('7-11')) return '7-ELEVEN';
            if (upperName.includes('全家')) return '全家';
            if (upperName.includes('萊爾富')) return '萊爾富';
            if (upperName.includes('OK便利商店') || upperName.includes('OK MART')) return 'OK便利商店';
            if (upperName.includes('全聯')) return '全聯';
            if (upperName.includes('家樂福')) return '家樂福';
            if (upperName.includes('蝦皮')) return '蝦皮';

        }

        // 全域的品牌過濾邏輯 (支援切換與摺疊 Nearest 區塊)
        window.activeConvenienceBrand = window.activeConvenienceBrand || {};
        window.filterStoreBrand = function (safeCatId, brand) {
            const container = document.getElementById('list-' + safeCatId);
            const nearestContainer = document.getElementById('nearest-container-' + safeCatId);
            const nearestContent = document.getElementById('nearest-content-' + safeCatId);
            if (!container) return;

            const items = container.querySelectorAll('.store-item');
            const cards = document.querySelectorAll('.brand-card-' + safeCatId);

            if (window.activeConvenienceBrand[safeCatId] === brand) {
                window.activeConvenienceBrand[safeCatId] = null;
                items.forEach(item => item.style.display = 'none');
                if (nearestContainer) nearestContainer.classList.remove('hidden');

                cards.forEach(card => {
                    card.classList.remove('border-yellow-400', 'bg-yellow-50');
                    card.classList.add('border-transparent', 'bg-white');
                });

                const clusterGroup = shoppingClusterGroups[safeCatId];
                if (clusterGroup) {
                    clusterGroup.clearLayers();
                    const map = shoppingMaps[safeCatId];
                    if (map && map.activeMarker) {
                        map.removeLayer(map.activeMarker);
                        map.activeMarker = null;
                    }
                }
            } else {
                window.activeConvenienceBrand[safeCatId] = brand;
                items.forEach(item => {
                    if (item.dataset.brand === brand) {
                        item.style.display = '';
                    } else {
                        item.style.display = 'none';
                    }
                });

                if (nearestContainer) nearestContainer.classList.remove('hidden');
                if (nearestContent) {
                    nearestContent.classList.add('hidden');
                    nearestContent.classList.remove('flex');
                    const nearestBtn = document.querySelector(`#nearest-header-${safeCatId} button`);
                    if (nearestBtn) {
                        nearestBtn.innerHTML = '<i class="fa-solid fa-map-location-dot"></i> 點擊尋找 (Top 5)';
                    }
                }

                cards.forEach(card => {
                    if (card.dataset.brand === brand) {
                        card.classList.add('border-yellow-400', 'bg-yellow-50');
                        card.classList.remove('border-transparent', 'bg-white');
                    } else {
                        card.classList.remove('border-yellow-400', 'bg-yellow-50');
                        card.classList.add('border-transparent', 'bg-white');
                    }
                });

                const clusterGroup = shoppingClusterGroups[safeCatId];
                const markersMap = shoppingMarkersMap[safeCatId];
                const map = shoppingMaps[safeCatId];

                if (clusterGroup && markersMap && map) {
                    clusterGroup.clearLayers();
                    if (map.activeMarker) {
                        map.removeLayer(map.activeMarker);
                        map.activeMarker = null;
                    }

                    for (let storeName in markersMap) {
                        const marker = markersMap[storeName];
                        const storeBrand = getStoreBrand(storeName);
                        if (storeBrand === brand) {
                            clusterGroup.addLayer(marker);
                        }
                    }

                    if (clusterGroup.getLayers().length > 0) {
                        map.fitBounds(clusterGroup.getBounds(), { padding: [40, 40], maxZoom: 15, animate: true });
                    }
                }
            }
        };

            if ("geolocation" in navigator) {

                    const userLat = position.coords.latitude;
                    const userLng = position.coords.longitude;

                    const stores = globalShoppingData.filter(item => item.category === catName && item.lat && item.lng);

                    stores.forEach(store => {

                        listHtml += `
                            <li onclick="focusNearestStore('${safeCatId}', '${catName.replace(/'/g, "\\'")}', '${store.name.replace(/'/g, "\\'")}', ${store.lat}, ${store.lng})" class="cursor-pointer flex flex-row items-center justify-between bg-white p-2.5 rounded-xl shadow-sm border border-orange-50 hover:border-orange-300 hover:shadow-md hover:-translate-y-1 transition-all group">

                                    </div>
                                </div>
                                <a href="https://www.google.com/maps/dir/?api=1&origin=${userLat},${userLng}&destination=${store.lat},${store.lng}" target="_blank" onclick="event.stopPropagation()" class="bg-orange-50 text-orange-500 hover:bg-orange-500 hover:text-white w-8 h-8 rounded-full flex items-center justify-center transition-colors shadow-sm shrink-0" title="導航去">
                                    <i class="fa-solid fa-location-arrow text-xs"></i>
                                </a>
                            </li>
                        `;
                    });
                    listEl.innerHTML = listHtml;

                    const contentEl = document.getElementById(`nearest-content-${safeCatId}`);
                    contentEl.classList.remove('hidden');
                    contentEl.classList.add('flex');

                    if (btn) {
                        btn.innerHTML = '<i class="fa-solid fa-rotate-right"></i> 重新定位';
                        btn.disabled = false;
                    }

                    const mapId = `nearest-map-${safeCatId}`;
                    let map = window.nearestMaps[safeCatId];

                    if (map) {
                        map.remove();
                    }

                    map = L.map(mapId, { zoomControl: false }).setView([userLat, userLng], 15);
                    L.control.zoom({ position: 'bottomright' }).addTo(map);
                    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                        attribution: '&copy; OpenStreetMap', maxZoom: 20
                    }).addTo(map);

                    window.nearestMaps[safeCatId] = map;
                    window.nearestMarkersMap[safeCatId] = {};
                    map.activeNearestMarker = null;
                    const bounds = L.latLngBounds();

                    const userIcon = L.divIcon({
                        className: 'user-location-icon border-0 bg-transparent',
                        html: `<div class="w-5 h-5 bg-blue-500 rounded-full border-2 border-white shadow-md relative mt-2"><div class="absolute inset-0 bg-blue-500 rounded-full animate-ping opacity-75"></div></div>`,
                        iconSize: [20, 20], iconAnchor: [10, 10]
                    });
                    const userMarker = L.marker([userLat, userLng], { icon: userIcon, zIndexOffset: 1000 }).addTo(map);
                    userMarker.bindPopup('<div class="font-black text-blue-500 text-center">您的現在位置</div>').openPopup();
                    bounds.extend([userLat, userLng]);

                    nearestStores.forEach((store, idx) => {
                        const marker = L.marker([store.lat, store.lng], { icon: getCategoryIcon(catName, store.name, 'normal') }).addTo(map);
                        window.nearestMarkersMap[safeCatId][store.name] = marker;
                        let cleanName = typeof getCleanStoreName === 'function' ? getCleanStoreName(store.name, catName) : store.name;

                        let popupContent = `
                            <div class="text-center p-1 pt-5 w-50">
                                <div class="font-black text-white bg-orange-400 px-2 py-0.5 rounded-md inline-block text-[10px] mb-1.5 shadow-sm">離你第 ${idx + 1} 近</div>
                                <h4 class="font-black text-gray-800 text-sm leading-[1.1] mb-1" title="${store.name}">${formatStoreName(store.name)}</h4>
                                <p class="text-[10px] text-gray-500 font-bold mb-1"><i class="fa-solid fa-location-dot mr-1"></i>${store.address}</p>
                                <a href="https://www.google.com/maps/dir/?api=1&origin=${userLat},${userLng}&destination=${store.lat},${store.lng}" target="_blank" class="mt-2 block w-full bg-orange-100 text-orange-600 font-black py-1.5 rounded-lg text-xs hover:bg-orange-500 hover:text-white transition-colors shadow-sm">開始導航</a>
                            </div>
                        `;
                        marker.bindPopup(popupContent);
                        bounds.extend([store.lat, store.lng]);

                        marker.on('click', () => {
                            focusNearestStore(safeCatId, catName, store.name, store.lat, store.lng, false);
                        });
                    });

                    setTimeout(() => {
                        map.invalidateSize();
                        if (bounds.isValid()) {
                            map.fitBounds(bounds, { padding: [40, 40], maxZoom: 16 });
                        }
                    }, 300);

                }, (error) => {
                    alert("無法取得您的位置，請確認是否允許瀏覽器存取定位權限。");
                    if (btn) {
                        btn.innerHTML = '<i class="fa-solid fa-map-location-dot"></i> 點擊尋找 (Top 5)';
                        btn.disabled = false;
                    }
                });
            } else {
                alert("您的瀏覽器不支援定位功能。");
                if (btn) {
                    btn.innerHTML = '<i class="fa-solid fa-map-location-dot"></i> 點擊尋找 (Top 5)';
                    btn.disabled = false;
                }
            }
        };

        window.focusNearestStore = function (safeCatId, catName, storeName, lat, lng, doFly = true) {
            const map = window.nearestMaps[safeCatId];
            const markersMap = window.nearestMarkersMap[safeCatId];
            if (!map || !markersMap) return;

            const marker = markersMap[storeName];
            if (!marker) return;

            if (map.activeNearestMarker && map.activeNearestMarker !== storeName && markersMap[map.activeNearestMarker]) {
                const prevMarker = markersMap[map.activeNearestMarker];
                if (prevMarker.bounceTimeout) clearTimeout(prevMarker.bounceTimeout);
                prevMarker.setIcon(getCategoryIcon(catName, map.activeNearestMarker, 'normal', false));
            }

            map.activeNearestMarker = storeName;

            if (doFly) {
                const targetZoom = 16;
                const pt = map.project([lat, lng], targetZoom);
                pt.y -= map.getSize().y / 4;
                const offsetLatLng = map.unproject(pt, targetZoom);

                map.flyTo(offsetLatLng, targetZoom, { animate: true, duration: 1 });
                map.once('moveend', () => {
                    marker.openPopup();
                });
            } else {
                marker.openPopup();
            }

            marker.setIcon(getCategoryIcon(catName, storeName, 'clicked', true));

            if (marker.bounceTimeout) clearTimeout(marker.bounceTimeout);
            marker.bounceTimeout = setTimeout(() => {
                if (markersMap[storeName] && map.activeNearestMarker === storeName) {
                    marker.setIcon(getCategoryIcon(catName, storeName, 'clicked', false));
                }
            }, 5000);
        };

        // --- 全域資料快取 ---
        let globalFoodData = null;
        let globalShoppingData = null;
        let globalCommunityData = null;
        let globalBuildingData = null;
        let globalMedicalData = null;
        let globalLikesData = null;

        function getUserId() {
            let uid = localStorage.getItem('a7club_uid');
            if (!uid) {
                uid = 'user_' + Math.random().toString(36).substr(2, 9) + Date.now();
                localStorage.setItem('a7club_uid', uid);
            }
            return uid;
        }
        const currentUserId = getUserId();

        // --- 補齊缺失的共享資料載入函式 (修復 ReferenceError) ---
        async function loadSharedFoodData() {
            if (globalFoodData) return globalFoodData;
            try {
                // 嘗試從預設表單載入資料
                const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSRpjRieI_ie-YP6zh_a-PBR6thBdyoAuVvMB53A32mJlc0qx1fFd1_2RoeBeQUCGvBQlcACPY1HUVT/pub?gid=1869818804&single=true&output=csv';
                const res = await fetch(csvUrl);
                const csvText = await res.text();
                const rows = parseCSV(csvText);
                if (rows.length < 2) return [];
                const data = rows.slice(1).map(row => ({
                    name: row[0], category: row[1], address: row[2], lat: row[3], lng: row[4]
                })).filter(i => i.name);
                globalFoodData = data;
                return data;
            } catch(e) { return []; }
        }

        async function loadSharedShoppingData() {
            if (globalShoppingData) return globalShoppingData;
            return [];
        }

        async function loadSharedCommunityData() {
            if (globalCommunityData) return globalCommunityData;
            return [];
        }

        async function loadSharedBuildingData() {
            if (globalBuildingData) return globalBuildingData;
            return [];
        }

        async function loadSharedLikesData() {
            if (globalLikesData) return globalLikesData;
            return {};
        }

        // 避免缺少地圖相關函式導致的例外錯誤 (安全保護)
        if (typeof initFoodMap !== 'function') window.initFoodMap = function() {};
        if (typeof fetchFoodData !== 'function') window.fetchFoodData = function() {};
        if (typeof fetchShoppingData !== 'function') window.fetchShoppingData = function() {};
        if (typeof locateUserOnFoodMap !== 'function') window.locateUserOnFoodMap = function() {};
        if (typeof showShoppingMap !== 'function') window.showShoppingMap = function() {};
        if (typeof updateFoodMap !== 'function') window.updateFoodMap = function() {};
    </script>
</body>
</html>
